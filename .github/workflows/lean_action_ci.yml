name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

# API-docs publishing is intentionally DISABLED (this is a private spec; GitHub Pages on a private
# repo is public by default, so auto-deploy would expose it). Only read access is granted — the
# `pages: write` / `id-token: write` tokens are removed so nothing in CI can deploy to Pages. See
# the disabled docgen step at the end of the job to re-enable after a deliberate visibility choice.
permissions:
  contents: read # Read access to repository contents

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1
      # Axiom-cleanliness gate: fail CI if any declaration in CflibsFormal depends on an axiom
      # outside {propext, Classical.choice, Quot.sound} (catches sorry/admit, native_decide, and
      # home-rolled axioms — including through imports — which grep cannot). Tool vendored in tools/.
      - name: Axiom-cleanliness gate
        run: lake exe axiom-audit --root CflibsFormal
      # Upstream-seed gate: the SahaUpstream lib (the self-contained physlib seed) is not in
      # defaultTargets, so build + axiom-audit it explicitly to keep the "axiom-audited separately"
      # claim in lakefile.toml true.
      - name: Upstream-seed gate
        run: |
          lake build SahaUpstream
          lake exe axiom-audit --root SahaUpstream
      # Import hygiene + stats (pure grep, cheapest — runs before the linter so a trivial import
      # violation fails fast): every module imports only Mathlib/CflibsFormal (acyclicity is
      # guaranteed by the build); also prints derived declaration counts.
      - name: Import-hygiene + stats
        run: ./scripts/stats.sh
      # Style/structure-lint gate: mathlib/batteries environment linters (docBlame, simpNF,
      # unusedArguments, ...) on the CflibsFormal library — catches missing docstrings, unused
      # hypotheses, non-simp-normal-form lemmas, etc. that build + axiom-audit do not.
      - name: Lint gate
        run: lake exe runLinter CflibsFormal
      # Regression-oracle self-check: the committed fixtures must match the generator (no drift),
      # and the reference checker must pass (fixtures internally consistent with the spec formulas).
      - name: Regression-oracle self-check
        run: |
          lake exe oracle-fixtures > /tmp/fixtures.json
          diff -u oracle/fixtures.json /tmp/fixtures.json
          python3 oracle/check_fixtures.py
      # Docs-sync + scope-tag-completeness gate: regenerate the auto docs and (a) fail if any result
      # is missing a curated scope tag in docs/scope-tags.tsv (gen-docs.sh exits non-zero), and
      # (b) fail if the committed module-reference / theorem-catalog drift from source. Same
      # regenerate-and-diff discipline as the oracle self-check; this is the integrity-spine gate —
      # a new theorem cannot land undocumented OR without an EXACT/REDUCED/APPROXIMATION/PURE-MATH tag.
      - name: Docs-sync gate
        run: |
          ./scripts/gen-docs.sh
          git diff --exit-code -- docs/module-reference.md docs/theorem-catalog.md
      # Epistemic-drift gate: fail if a module with an EXACT result transitively depends on a
      # PURE-approximation module (an exact claim resting only on approximate physics). Mixed-tag
      # dependencies are advisory warnings only — module granularity cannot prove per-theorem
      # over-reach. Complements the scope-tag-completeness check in the docs-sync gate above.
      - name: Scope-consistency gate
        run: ./scripts/check-scope-consistency.sh
      # API-docs publishing (doc-gen4 HTML -> GitHub Pages) is DISABLED on purpose: this is a
      # PRIVATE spec, and Pages on a private repo is public by default, so this step would expose
      # it. The HTML reference can still be built on demand (doc-gen4, see leanprover/doc-gen4). To
      # publish later, restore the `pages: write` / `id-token: write` permissions above and
      # re-enable this step — as an access-controlled artifact or a deliberate Pages deploy.
      # - uses: leanprover-community/docgen-action@v1

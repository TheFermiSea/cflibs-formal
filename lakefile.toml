name = "cflibs-formal"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["CflibsFormal"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.31.0"

[[lean_lib]]
name = "CflibsFormal"

# Axiom-cleanliness gate (vendored from leanprover-community/axiom-audit, Apache-2.0; see
# tools/README.md). `lake exe axiom-audit --root CflibsFormal` fails if any declaration
# depends on an axiom outside {propext, Classical.choice, Quot.sound}. Dependency-free.
[[lean_lib]]
name = "AxiomAudit"
srcDir = "tools"

[[lean_exe]]
name = "axiom-audit"
srcDir = "tools"
root = "Main"
supportInterpreter = true

# Numerical regression-oracle generator: a computable Float MIRROR of the verified forward
# map + classic inversion (NOT part of the verified spec; see oracle/README.md). Emits
# fixtures instantiating the proven theorems. `lake exe oracle-fixtures > oracle/fixtures.json`.
[[lean_exe]]
name = "oracle-fixtures"
srcDir = "oracle"
root = "Generate"
supportInterpreter = true
